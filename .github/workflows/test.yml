name: Run All Tests

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2

      - name: Setup Luver
        uses: MunifTanjim/luver-action@v1

      - name: Install Lua version
        run: |
          luver install lua 5.4.3
          luver use 5.4.3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

