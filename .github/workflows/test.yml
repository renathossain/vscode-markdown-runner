name: Run All Tests

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4 luarocks haskell-stack

      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install lua luarocks haskell-stack

      - name: Install Dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $wingetFlags = @(
            "--silent",
            "--disable-interactivity",
            "--accept-package-agreements",
            "--accept-source-agreements"
          )
          winget source update
          winget source accept --source msstore
          winget install --id DEVCOM.Lua @wingetFlags
          winget install --id commercialhaskell.stack @wingetFlags

      - name: Setup Stack
        run: stack setup

      # - name: Install system dependencies
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y \
      #       xvfb \
      #       build-essential \
      #       curl wget git ca-certificates \
