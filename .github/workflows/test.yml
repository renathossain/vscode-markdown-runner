name: Run All Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest

    steps:
      - name: Update system
        run: pacman -Syu --noconfirm

      - name: Install yay
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          pacman -S --noconfirm --needed git base-devel sudo
          su builder -c '
            cd /home/builder &&
            git clone https://aur.archlinux.org/yay.git &&
            cd yay &&
            makepkg -si --noconfirm &&
            cd ..
          '

      - name: Install base dependencies
        run: |
          su builder -c '
            yay -S --noconfirm --needed \
              xorg-server-xvfb npm python nodejs ruby lua julia go groovy \
              dart r perl php typescript gcc rustup jdk-openjdk stack-bin \
              atk gtk3 pango cairo gdk-pixbuf2 \
              libx11 libxss libxtst libxrandr libxcomposite \
              nss nspr fontconfig freetype2 alsa-lib
          '
          su builder -c "rustup default stable"
          su builder -c "stack setup"

      - name: Checkout repository
        run: git clone https://github.com/${{ github.repository }} .

      - name: Install Node dependencies
        run: npm ci

      - name: Run tests
        run: xvfb-run -a npm run test
