name: Run All Tests

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: npm

      - name: Install TypeScript
        run: npm install -g typescript

      - name: Setup Python
        uses: actions/setup-python@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4 luarocks haskell-stack groovy

      - name: Install System Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install lua luarocks haskell-stack groovy

      - name: Install System Dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco feature enable -n allowGlobalConfirmation
          choco install lua groovy haskell-stack --no-progress
          Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
          refreshenv
          Write-Host "===== FULL PATH AFTER INSTALL + REFRESHENV ====="
          Write-Host $env:PATH
          Write-Host "================================================"
          $paths = $env:PATH -split ';'
          $filtered = $paths | Where-Object {
            $_ -match "Lua|Groovy"
          }
          foreach ($p in $filtered) {
            if ($p) {
              Add-Content -Path $env:GITHUB_PATH -Value $p
            }
          }

      - name: Setup Stack
        run: stack setup

      - name: Install Node Dependencies
        run: npm ci

      - name: Run Tests
        shell: bash
        run: if [ "$RUNNER_OS" = "Linux" ]; then xvfb-run -a npm run test; else npm run test; fi
